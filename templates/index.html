<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gym Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header class="dashboard-header">
            <div class="logo">
                <span class="icon">AI</span>
                <h1>AI Gym <span>Tracker</span></h1>
            </div>
            <p class="subtitle">Real-time Pose Estimation & Auto-Counting</p>
        </header>

        <main class="dashboard-grid">
            <section class="video-section">
                <div class="video-container glass-panel">
                    <img id="video-stream" src="{{ url_for('video_feed') }}" alt="Webcam Stream" />

                    <div class="loading-overlay" id="loading-overlay">
                        <div class="spinner"></div>
                        <p>Initializing Camera...</p>
                    </div>
                </div>
            </section>

            <section class="control-panel glass-panel">
                <h2>Workout Controls</h2>

                <div class="control-group">
                    <label>Select Exercise</label>
                    <div class="exercise-selector">
                        <button class="ex-btn active" onclick="setExercise('Bicep Curl', this)">Bicep Curl</button>
                        <button class="ex-btn" onclick="setExercise('Shoulder Press', this)">Shoulder Press</button>
                        <button class="ex-btn" onclick="setExercise('Squat', this)">Squat</button>
                        <button class="ex-btn" onclick="setExercise('Plank', this)">Plank</button>
                        <button class="ex-btn" onclick="setExercise('High Knees', this)">High Knees</button>
                    </div>
                </div>

                <div class="control-group action-buttons">
                    <button class="btn btn-primary" onclick="resetCounter()">
                        <span class="btn-icon">Reset</span>
                    </button>
                </div>

                <div class="status-box">
                    <h3>Status</h3>
                    <p>Camera is <span class="status-indicator online">Online</span></p>
                    <p>Current exercise: <span id="current-exercise-label">Bicep Curl</span></p>
                </div>
            </section>
        </main>
    </div>

    <script>
        const img = document.getElementById('video-stream');
        const exerciseLabel = document.getElementById('current-exercise-label');
        img.onload = function() {
            document.getElementById('loading-overlay').style.display = 'none';
        };

        function refreshVideoStream() {
            img.src = "{{ url_for('video_feed') }}?t=" + Date.now();
        }

        function setActiveButton(exerciseName) {
            const buttons = document.querySelectorAll('.ex-btn');
            buttons.forEach(btn => {
                const isActive = btn.textContent.trim() === exerciseName;
                btn.classList.toggle('active', isActive);
            });
        }

        fetch('/current_exercise')
            .then(response => response.json())
            .then(data => {
                exerciseLabel.textContent = data.exercise;
                setActiveButton(data.exercise);
                refreshVideoStream();
            })
            .catch((error) => {
                console.error('Error:', error);
            });

        function setExercise(exerciseName, btnElement) {
            const buttons = document.querySelectorAll('.ex-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            fetch('/set_exercise', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ exercise: exerciseName }),
            })
            .then(response => response.json())
            .then((data) => {
                exerciseLabel.textContent = data.exercise || exerciseName;
                refreshVideoStream();
                console.log('Exercise changed to', data.exercise || exerciseName);
            })
            .catch((error) => {
                console.error('Error:', error);
            });
        }

        function resetCounter() {
            fetch('/reset_counter', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(() => {
                refreshVideoStream();
                console.log('Counter Reset');
            })
            .catch((error) => {
                console.error('Error:', error);
            });
        }
    </script>
</body>
</html>
